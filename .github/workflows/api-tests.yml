name: API Endpoint Tests

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual triggering
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main] # Test PRs to main branch
    paths:
      - 'ts/src/**'
      - 'go/**'
      - 'rust/**'
      - 'haskell/**'
      - '.github/workflows/api-tests.yml'

jobs:
  ts-code-quality:
    name: TS Code Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: cd .. && npm ci

      - name: Run linting
        run: npm run lint

      - name: Run formatting check
        run: npm run format:check

  ts-tests:
    name: Run TS Vitest Tests
    runs-on: ubuntu-latest
    needs: ts-code-quality
    defaults:
      run:
        working-directory: ts
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: cd .. && npm ci

      - name: Run tests
        run: npm run test

  go-tests:
    name: Run Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./...

  rust-tests:
    name: Run Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test

  haskell-tests:
    name: Run Haskell Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: haskell
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          enable-stack: true
          stack-version: 'latest'

      - name: Cache Stack
        uses: actions/cache@v3
        with:
          path: |
            ~/.stack
            haskell/.stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('haskell/stack.yaml') }}-${{ hashFiles('haskell/package.yaml') }}

      - name: Build
        run: stack build

      - name: Run tests
        run: stack test

  test-deployed-endpoints:
    name: Test Deployed API Endpoints
    runs-on: ubuntu-latest
    needs: ts-tests
    # Skip endpoint testing on PRs and pushes, only run on schedule and manual dispatch
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    strategy:
      matrix:
        deployment: ['vercel'] # 'aws' commented out for now
        include:
          - deployment: vercel
            # Dynamic URL based on context
            base_url: ${{ github.event_name == 'pull_request' && format('https://portfolio-api-{0}-shinguakira.vercel.app', github.head_ref) || 'https://portfolio-api-ten-delta.vercel.app' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Wait for deployment (Allow time for fresh deployments to stabilize)
        run: sleep 30s
        if: github.event_name == 'push'

      - name: Install test dependencies
        run: npm install -g newman

      - name: Create Postman collection file
        run: |
          cat > portfolio-api-tests.json << 'EOL'
          {
            "info": {
              "name": "Portfolio API Tests",
              "schema": "https://schema.getpostman.com/json/collection/v2.1.0/collection.json"
            },
            "item": [
              {
                "name": "Health Check",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/health"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});",
                        "pm.test('Response is valid JSON', function() {",
                        "  pm.response.to.be.json;",
                        "});",
                        "pm.test('Has status field', function() {",
                        "  const responseJson = pm.response.json();",
                        "  pm.expect(responseJson).to.have.property('status');",
                        "  pm.expect(responseJson.status).to.equal('OK');",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "Root Path",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});",
                        "pm.test('Response is valid JSON', function() {",
                        "  pm.response.to.be.json;",
                        "});",
                        "pm.test('Has endpoints array', function() {",
                        "  const responseJson = pm.response.json();",
                        "  pm.expect(responseJson).to.have.property('endpoints');",
                        "  pm.expect(responseJson.endpoints).to.be.an('array');",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "Profile",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/api/profile"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "Skills",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/api/skills"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "Projects",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/api/projects"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "Experience",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/api/experience"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "Education",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/api/education"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "Certifications",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/api/certifications"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "FAQs",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/api/faqs"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "Links",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/api/links"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "Strong Points",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/api/strong-points"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});"
                      ]
                    }
                  }
                ]
              },
              {
                "name": "Changelogs",
                "request": {
                  "method": "GET",
                  "url": "{{baseUrl}}/api/changelogs"
                },
                "event": [
                  {
                    "listen": "test",
                    "script": {
                      "exec": [
                        "pm.test('Status code is 200', function() {",
                        "  pm.response.to.have.status(200);",
                        "});"
                      ]
                    }
                  }
                ]
              }
            ]
          }
          EOL

      - name: Run API tests
        id: api_tests
        continue-on-error: true
        run: |
          echo "Testing ${{ matrix.deployment }} deployment at ${{ matrix.base_url }}"
          newman run portfolio-api-tests.json --env-var "baseUrl=${{ matrix.base_url }}" --reporters cli,json --reporter-json-export test-results.json

      - name: Create summary
        if: always()
        run: |
          echo "## API Test Results for ${{ matrix.deployment }}" >> $GITHUB_STEP_SUMMARY
          echo "Base URL: ${{ matrix.base_url }}" >> $GITHUB_STEP_SUMMARY

          if [ -f test-results.json ]; then
            TOTAL_TESTS=$(jq '.run.stats.tests // 0' test-results.json)
            FAILED_TESTS=$(jq '.run.stats.failures // 0' test-results.json)
            PASSED_TESTS=$(jq '(.run.stats.tests // 0) - (.run.stats.failures // 0)' test-results.json)

            echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "Passed: $PASSED_TESTS" >> $GITHUB_STEP_SUMMARY
            echo "Failed: $FAILED_TESTS" >> $GITHUB_STEP_SUMMARY
            echo "Total: $TOTAL_TESTS" >> $GITHUB_STEP_SUMMARY
          else
            echo "No test results found" >> $GITHUB_STEP_SUMMARY
          fi
