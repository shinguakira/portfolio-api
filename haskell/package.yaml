name: portfolio-api-haskell
version: 1.0.0
category: Web
synopsis: Portfolio API backend in Haskell

dependencies:
  - base >= 4.14 && < 5
  - scotty >= 0.20
  - aeson >= 2.0
  - text
  - wai >= 3.2
  - wai-cors >= 0.2
  - warp >= 3.3
  - bytestring
  - HPDF >= 1.5
  - http-types >= 0.12
  - time >= 1.9
  - containers

default-extensions:
  - OverloadedStrings
  - DeriveGeneric

ghc-options:
  - -Wall

library:
  source-dirs: src

executables:
  portfolio-api-haskell:
    main: Main.hs
    source-dirs: app
    dependencies:
      - portfolio-api-haskell
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N

tests:
  portfolio-api-haskell-test:
    main: Spec.hs
    source-dirs: test
    dependencies:
      - portfolio-api-haskell
      - hspec >= 2.10
      - hspec-wai >= 0.11
      - aeson
    ghc-options:
      - -threaded
